<svg width="100%" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,system-ui,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Column headers -->
  <text x="174" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#444441">Public HTTPS traffic</text>
  <text x="506" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#444441">Private Tailscale access</text>

  <!-- Divider -->
  <line x1="340" y1="16" x2="340" y2="544" stroke="#D3D1C7" stroke-width="0.8" stroke-dasharray="6 4"/>

  <!-- ── LEFT: PUBLIC PATH ── -->

  <!-- Browser -->
  <rect x="60" y="44" width="228" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="174" y="62" text-anchor="middle" font-size="13" font-weight="600" fill="#0C447C">Browser / client</text>
  <text x="174" y="78" text-anchor="middle" font-size="11" fill="#185FA5">https://rancher.ewtst.com</text>
  <line x1="174" y1="88" x2="174" y2="122" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Route 53 -->
  <rect x="60" y="124" width="228" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="174" y="142" text-anchor="middle" font-size="13" font-weight="600" fill="#0C447C">AWS Route 53</text>
  <text x="174" y="158" text-anchor="middle" font-size="11" fill="#185FA5">*.ewtst.com A → Contabo IP</text>
  <line x1="174" y1="168" x2="174" y2="202" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Contabo public IP -->
  <rect x="60" y="204" width="228" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="174" y="222" text-anchor="middle" font-size="13" font-weight="600" fill="#444441">Contabo public IP</text>
  <text x="174" y="238" text-anchor="middle" font-size="11" fill="#5F5E5A">Port 80 + 443 only (UFW)</text>
  <line x1="174" y1="248" x2="174" y2="282" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Traefik -->
  <rect x="60" y="284" width="228" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="174" y="304" text-anchor="middle" font-size="13" font-weight="600" fill="#3C3489">Traefik ingress</text>
  <text x="174" y="322" text-anchor="middle" font-size="11" fill="#534AB7">TLS via cert-manager · Host routing</text>

  <!-- cert-manager side -->
  <line x1="174" y1="340" x2="174" y2="364" stroke="#888" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-dashed)"/>
  <rect x="60" y="364" width="228" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="174" y="382" text-anchor="middle" font-size="13" font-weight="600" fill="#444441">cert-manager</text>
  <text x="174" y="398" text-anchor="middle" font-size="11" fill="#5F5E5A">Let's Encrypt · auto-renew</text>
  <line x1="174" y1="408" x2="174" y2="434" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Services -->
  <rect x="60" y="436" width="228" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="174" y="460" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Services</text>
  <text x="174" y="478" text-anchor="middle" font-size="11" fill="#0F6E56">rancher · harbor · drone</text>
  <text x="174" y="496" text-anchor="middle" font-size="11" fill="#0F6E56">nextcloud · *.ewtst.com</text>

  <!-- ── RIGHT: PRIVATE TAILSCALE PATH ── -->

  <!-- Developer machine -->
  <rect x="392" y="44" width="228" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="506" y="62" text-anchor="middle" font-size="13" font-weight="600" fill="#633806">Developer machine</text>
  <text x="506" y="78" text-anchor="middle" font-size="11" fill="#854F0B">Enrolled in Tailscale tailnet</text>
  <line x1="506" y1="88" x2="506" y2="122" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Tailscale VPN -->
  <rect x="392" y="124" width="228" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="506" y="142" text-anchor="middle" font-size="13" font-weight="600" fill="#633806">Tailscale VPN</text>
  <text x="506" y="158" text-anchor="middle" font-size="11" fill="#854F0B">WireGuard tunnel · no open ports</text>
  <line x1="506" y1="168" x2="506" y2="202" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Master node Tailscale IP -->
  <rect x="392" y="204" width="228" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="506" y="222" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Master node Tailscale IP</text>
  <text x="506" y="238" text-anchor="middle" font-size="11" fill="#0F6E56">kubeadm API server address</text>
  <line x1="506" y1="248" x2="506" y2="282" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- kubectl / SSH -->
  <rect x="392" y="284" width="228" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="506" y="304" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">kubectl · SSH</text>
  <text x="506" y="322" text-anchor="middle" font-size="11" fill="#0F6E56">Full cluster admin access</text>
  <line x1="506" y1="340" x2="506" y2="374" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Both nodes -->
  <rect x="392" y="376" width="228" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="506" y="396" text-anchor="middle" font-size="13" font-weight="600" fill="#444441">Both VPS nodes</text>
  <text x="506" y="414" text-anchor="middle" font-size="11" fill="#5F5E5A">master + worker on tailnet</text>

  <!-- Security note -->
  <rect x="392" y="452" width="228" height="68" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="506" y="472" text-anchor="middle" font-size="11" fill="#633806">6443 · 22 · etcd — all firewalled</text>
  <text x="506" y="490" text-anchor="middle" font-size="11" fill="#633806">No public exposure for admin</text>
  <text x="506" y="508" text-anchor="middle" font-size="11" fill="#633806">ports — Tailscale only</text>
</svg>
