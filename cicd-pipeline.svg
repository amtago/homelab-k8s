<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,system-ui,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Step 1: Developer -->
  <rect x="40" y="40" width="120" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="100" y="63" text-anchor="middle" font-size="13" font-weight="600" fill="#444441">Developer</text>
  <text x="100" y="80" text-anchor="middle" font-size="11" fill="#5F5E5A">git push to main</text>

  <line x1="160" y1="68" x2="192" y2="68" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="176" y="62" text-anchor="middle" font-size="10" fill="#888780">push</text>

  <!-- Step 2: GitHub Actions -->
  <rect x="194" y="40" width="120" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="254" y="63" text-anchor="middle" font-size="13" font-weight="600" fill="#0C447C">GitHub Actions</text>
  <text x="254" y="80" text-anchor="middle" font-size="11" fill="#185FA5">Build Docker image</text>

  <line x1="314" y1="68" x2="346" y2="68" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="330" y="62" text-anchor="middle" font-size="10" fill="#888780">push</text>

  <!-- Step 3: Harbor -->
  <rect x="348" y="40" width="120" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="408" y="63" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Harbor</text>
  <text x="408" y="80" text-anchor="middle" font-size="11" fill="#0F6E56">harbor.ewtst.com</text>

  <line x1="468" y1="68" x2="500" y2="68" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="484" y="62" text-anchor="middle" font-size="10" fill="#888780">webhook</text>

  <!-- Step 4: Drone -->
  <rect x="502" y="40" width="120" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="562" y="63" text-anchor="middle" font-size="13" font-weight="600" fill="#3C3489">Drone CI</text>
  <text x="562" y="80" text-anchor="middle" font-size="11" fill="#534AB7">Run .drone.yml</text>

  <!-- Drone down to cluster -->
  <line x1="562" y1="96" x2="562" y2="148" stroke="#888" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Cluster container -->
  <rect x="40" y="150" width="600" height="80" rx="12" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
  <text x="66" y="172" font-size="13" font-weight="600" fill="#444441">Kubernetes cluster</text>

  <!-- Deployment update box -->
  <rect x="390" y="166" width="220" height="44" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="500" y="184" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">kubectl apply / helm upgrade</text>
  <text x="500" y="200" text-anchor="middle" font-size="10" fill="#0F6E56">New image tag deployed</text>

  <!-- Fleet GitOps box -->
  <rect x="60" y="166" width="200" height="44" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="160" y="184" text-anchor="middle" font-size="12" font-weight="600" fill="#712B13">Fleet GitOps</text>
  <text x="160" y="200" text-anchor="middle" font-size="10" fill="#993C1D">Continuous manifest sync</text>

  <!-- GitHub → Fleet path -->
  <path d="M254 96 Q254 280 160 280 Q160 280 160 230" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-dashed)"/>
  <text x="230" y="286" text-anchor="middle" font-size="10" fill="#888780">manifest changes → Fleet sync</text>

  <!-- Self-hosted runner annotation -->
  <rect x="160" y="260" width="200" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="260" y="278" text-anchor="middle" font-size="12" font-weight="600" fill="#633806">Self-hosted runner</text>
  <text x="260" y="294" text-anchor="middle" font-size="10" fill="#854F0B">Runs inside cluster · automation ns</text>

  <!-- runner connects back to GitHub Actions -->
  <path d="M260 260 Q260 130 254 96" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-dashed)"/>
</svg>
